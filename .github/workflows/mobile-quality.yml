name: Mobile quality

on:
  push:
    branches: [main, master]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-quality.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-quality.yml"

jobs:
  quality:
    name: typecheck & lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  maestro-structure:
    name: Maestro flows present
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Maestro flows exist
        shell: bash
        run: |
          test -d mobile/.maestro/flows
          find mobile/.maestro/flows -name "*.yaml" | grep -q .
